[build]
  base    = "."
  command = "npm run install:all && npm run build"
  publish = "client/dist"
  functions = "netlify/functions"

# Route /api/* to the matching Netlify Function.
# The client calls /api/generate-email and /api/health unchanged.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — send all unmatched routes to index.html so
# React Router (if added later) works correctly.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
